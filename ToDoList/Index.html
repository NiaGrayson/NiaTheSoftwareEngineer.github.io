<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>To-Do List Demo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>My To-Do List</h1>

        <div class="row">
            <input type="text" id="input-box" placeholder="Enter a name">
            <button onclick="addItem()">Add</button>
        </div>

        <ul id="list-container"></ul>

    </div>

    <script src="script.js"></script>

</body>
</html>
